# IPTV Mac Stalker - Configuration File

# This file contains default configuration for the IPTV Mac Stalker app
# Users can override these settings through the app's settings interface

# Default Server Configuration
[DEFAULT_SERVER]
# Example default server (users should configure their own)
# host = "portal.example.com"
# mac_address = "00:1A:2B:3C:4D:5E"

# Connection Settings
[CONNECTION]
# Connection timeout in seconds
timeout = 30
# Number of retry attempts
max_retries = 3
# Enable CORS proxy for web connections
use_cors_proxy = true
# Connection check interval (seconds)
health_check_interval = 300

# Streaming Settings
[STREAMING]
# Default video quality (auto, high, medium, low)
default_quality = "auto"
# Buffer size in MB
buffer_size = 10
# Enable hardware acceleration
hardware_acceleration = true
# Max concurrent streams
max_streams = 2

# UI Settings
[UI]
# Theme (auto, light, dark)
theme = "auto"
# Enable TV remote optimization
tv_remote_mode = true
# Show channel numbers
show_channel_numbers = true
# Enable keyboard shortcuts
enable_keyboard_shortcuts = true

# Logging
[LOGGING]
# Log level (debug, info, warn, error)
log_level = "info"
# Enable console logging
console_logging = true
# Max log files
max_log_files = 5

# Advanced Settings
[ADVANCED]
# Enable experimental features
experimental_features = false
# User agent string
user_agent = "Mozilla/5.0 (WebOS; Linux; SmartTV) AppleWebKit/537.36"
# Device ID format (mac, custom)
device_id_format = "mac"
